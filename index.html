<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weekly Money Tracker 💵</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <!-- Budget Section -->
      <section id="budget-section">
        <h2>My Budget</h2>

        <div class="input-group">
          <label for="budget-input">Enter Budget Amount:</label>

          <input type="number" id="budget-input" placeholder="e.g., 500" />

          <button type="button" id="save-budget-btn">Save Budget</button>
        </div>
      </section>

      <!-- Summary Section -->
      <section id="summary-section">
        <h2>Summary</h2>

        <div class="summary-item">
          <p>Weekly Budget: $<span id="display-budget">0</span></p>
        </div>

        <div class="summary-item">
          <p>Total Spent: $<span id="total-spent">0</span></p>
        </div>

        <div class="summary-item">
          <p>Money Left: $<span id="money-left">0</span></p>
        </div>
      </section>

      <!-- Expense Section -->
      <section id="expense-section">
        <h2>Add Expense</h2>

        <!-- Name -->
        <div class="input-group">
          <label for="expense-name">Expense Name</label>
          <input
            type="text"
            id="expense-name"
            placeholder="e.g., Grocery Shopping"
          />
        </div>

        <!-- Amount -->
        <div class="input-group">
          <label for="expense-amount">Amount</label>
          <input type="number" id="expense-amount" placeholder="e.g., 50" />
        </div>

        <!-- Category -->
        <div class="input-group">
          <label for="expense-category">Category</label>
          <select id="expense-category">
            <option value="Food">Food 🛒</option>
            <option value="Transport">Transport 🚇</option>
            <option value="Shopping">Shopping 🛍️</option>
            <option value="Bills">Bills 💸</option>
            <option value="Fun">Fun 🎉</option>
            <option value="Other">Other ✈️</option>
          </select>
        </div>

        <button type="button" id="add-expense-btn">Add Expense</button>
      </section>

      <!-- Expense List -->
      <section id="expense-list-section">
        <h2>Expenses</h2>
        <ul id="expense-list"></ul>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
